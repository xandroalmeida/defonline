name: PR — lint + segurança + Unit puros

# ADR-006 §3.1 — Pipeline de PR (leve, ~2-3 min).
# CI remoto NÃO sobe Postgres nem Chromium. Testes pesados (Pest Feature + Dusk) e
# cobertura ficam no pre-push hook local (scripts/git-hooks/pre-push.sh).
#
# Jobs em paralelo. Falha em qualquer um = bloqueio de merge.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Permite ser chamado como reusable workflow por main.yml e release-*.yml.
  workflow_call:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-php:
    name: Pint (lint)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, zip, bcmath, intl, mbstring
          coverage: none
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: app/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('app/composer.lock') }}
      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: ./vendor/bin/pint --test

  lint-static:
    name: Larastan (PHPStan nível 6)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, zip, bcmath, intl, mbstring
          coverage: none
      - uses: actions/cache@v4
        with:
          path: app/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('app/composer.lock') }}
      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  lint-pr-title:
    # ADR-006 §1.3: Conventional Commits aplica-se ao squash final (título do PR vira
    # commit). NÃO validamos cada commit do histórico — só o título do PR.
    name: Conventional Commits (PR title)
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            ci
            build
            revert
          requireScope: false
          subjectPatternError: |
            O título do PR deve ser Conventional Commits.
            Ex.: "feat: adicionar pre-push hook" — sem letra maiúscula no início do subject.

  test-unit-pure:
    name: Pest UnitPure (sem DB)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, zip, bcmath, intl, mbstring
          coverage: none
      - uses: actions/cache@v4
        with:
          path: app/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('app/composer.lock') }}
      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: php artisan test --testsuite=UnitPure

  test-coverage:
    # STORY-010 CA-3/4 — gate de cobertura no PR.
    #
    # Roda Pest All (UnitPure + Feature) com PCOV contra Postgres real (mesmo padrão
    # que release-homolog.yml usa). Falha o PR se a cobertura geral cair abaixo de 80%,
    # ou se app/Domain (quando existir) cair abaixo de 98% — gates prescritos em
    # ADR-006 §3.1 + quality-standards §1.1+§2.2.
    #
    # Artefato coverage-summary.txt é publicado em qualquer resultado (success/failure)
    # para auditoria e debugging.
    name: Pest All (coverage ≥80%)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: defonline
          POSTGRES_PASSWORD: defonline
          # `defonline_test` (não `defonline`) para casar com o override
          # `DB_DATABASE` forçado em app/phpunit.xml. Em local existem dois
          # bancos (defonline para smoke manual + defonline_test para testes);
          # CI só roda testes, então só precisa do banco de teste.
          POSTGRES_DB: defonline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U defonline -d defonline_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: defonline_test
      DB_USERNAME: defonline
      DB_PASSWORD: defonline
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, zip, bcmath, intl, mbstring
          coverage: pcov
      - uses: actions/cache@v4
        with:
          path: app/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('app/composer.lock') }}
      - run: composer install --prefer-dist --no-progress --no-interaction

      - name: Gera .env e .env.testing apontando para o Postgres do service
        # Laravel detecta APP_ENV=testing (do phpunit.xml) e carrega .env.testing
        # — então o `.env.testing` versionado (mira Dusk local contra web-test +
        # Mailpit) é sobrescrito aqui com providers in-memory (CI não tem
        # mailpit/redis). O `.env` é gerado também porque artisan key:generate
        # e similares leem dele.
        run: |
          ENV_BODY='APP_NAME=DEFOnline
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost
          APP_VERSION=ci
          LOG_CHANNEL=stack
          LOG_STACK=daily
          LOG_LEVEL=debug
          LOG_DAILY_DAYS=1
          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=defonline_test
          DB_USERNAME=defonline
          DB_PASSWORD=defonline
          SESSION_DRIVER=array
          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BROADCAST_CONNECTION=null
          TELEGRAM_BOT_TOKEN=
          PULSE_ENABLED=false
          TELESCOPE_ENABLED=false
          NIGHTWATCH_ENABLED=false'
          printf '%s\n' "$ENV_BODY" > .env
          printf '%s\n' "$ENV_BODY" > .env.testing

      - name: Habilita extensões Postgres (IDR-001 — normalmente initdb script)
        env:
          PGPASSWORD: defonline
        run: |
          psql -h 127.0.0.1 -U defonline -d defonline_test -v ON_ERROR_STOP=1 -c "
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS citext;
            CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
          "

      - name: app:key + migrate
        run: |
          php artisan key:generate --force
          php artisan migrate --force

      - name: Pest All com --coverage --min=80
        # `./vendor/bin/pest` direto (não `php artisan test`) porque o wrapper do
        # artisan engole o exit code do gate de cobertura do Pest 4.7. tee preserva o
        # exit code do pest via PIPESTATUS.
        run: |
          set -o pipefail
          ./vendor/bin/pest --testsuite=All --coverage --min=80 | tee coverage-summary.txt

      - name: Gate adicional ≥98% em app/Domain (quando a pasta existir)
        if: hashFiles('app/Domain/**/*.php') != ''
        run: |
          set -o pipefail
          ./vendor/bin/pest --configuration=phpunit-domain.xml --coverage --min=98 | tee -a coverage-summary.txt

      - name: Upload coverage-summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: app/coverage-summary.txt
          if-no-files-found: warn
          retention-days: 30

  security-deps:
    name: composer audit
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
      - run: composer audit --locked

  security-image:
    name: Trivy filesystem scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          skip-dirs: 'app/vendor,app/node_modules,app/storage'

  security-secrets:
    name: Gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  arch-no-pgadmin-in-ansible:
    # STORY-009 CA-10 — bloqueia merge se algum playbook/role Ansible referenciar
    # pgadmin / phppgadmin / adminer / dbgate. Ferramentas administrativas são
    # DEV LOCAL APENAS (ADR-005 §1.1, §6, §7.5).
    name: Arch — sem pgAdmin/Adminer em Ansible
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-no-pgadmin-in-ansible.sh

  flags-check:
    name: Feature flags (overdue)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    continue-on-error: true # warning, não bloqueia merge (ADR-006 §3.1)
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, zip, bcmath, intl, mbstring
          coverage: none
      - uses: actions/cache@v4
        with:
          path: app/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('app/composer.lock') }}
      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: php artisan pennant:list-overdue
