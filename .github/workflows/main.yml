name: main — build + publish GHCR

# ADR-006 §3.2 — Após merge em main, re-roda PR pipeline (defesa contra interferência
# de merge), constrói a imagem Docker multistage e publica em GHCR como
# `main-<sha>` + `latest`. Não faz deploy — promoção fica para tags.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/app

jobs:
  validate:
    name: Re-roda PR jobs contra o SHA mergeado
    uses: ./.github/workflows/pr.yml

  build-and-push:
    name: Build + push GHCR
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}

  notify:
    name: Notifica Telegram
    needs: build-and-push
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Status
        run: |
          STATUS="${{ needs.build-and-push.result == 'success' && '✅' || '❌' }}"
          MSG="${STATUS} DEFOnline main: ${{ github.sha }} — ${{ needs.build-and-push.result }}"
          echo "$MSG"
          # Telegram opcional (somente quando secrets existirem).
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID_HOMOLOG }}" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID_HOMOLOG }}" \
              -d "text=${MSG}" || true
          fi
