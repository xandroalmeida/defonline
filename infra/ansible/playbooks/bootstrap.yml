---
# Hardening básico da VPS Ubuntu 24.04 (ADR-005 §2.2).
# - Cria usuário deploy com chave SSH
# - Desabilita login root via SSH
# - UFW (firewall) + fail2ban + unattended-upgrades

- name: Bootstrap VPS — usuário, SSH, firewall, atualizações automáticas
  hosts: homolog
  # Primeira execução conecta como root; depois reusa user `deploy`.
  remote_user: "{{ initial_remote_user | default('root') }}"
  become: true
  gather_facts: true

  tasks:
    - name: APT update + upgrade (apenas se nunca rodou ou se diff > 7d)
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        cache_valid_time: 604800   # 7 dias

    - name: Pacotes base
      ansible.builtin.apt:
        name:
          - sudo
          - curl
          - ca-certificates
          - gnupg
          - ufw
          - fail2ban
          - unattended-upgrades
          - python3-pip
          - git
          - rsync
          - tzdata
        state: present

    - name: Timezone America/Sao_Paulo
      community.general.timezone:
        name: America/Sao_Paulo

    - name: Grupo deploy
      ansible.builtin.group:
        name: "{{ deploy_user }}"
        state: present

    - name: Usuário deploy (sudo NOPASSWD para operações de manutenção)
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        groups: sudo
        shell: /bin/bash
        create_home: true
        state: present

    - name: Sudoers — deploy NOPASSWD apenas para `docker compose`, `systemctl restart`
      ansible.builtin.copy:
        dest: /etc/sudoers.d/deploy
        owner: root
        group: root
        mode: "0440"
        content: |
          {{ deploy_user }} ALL=(root) NOPASSWD: /usr/bin/docker, /usr/bin/docker-compose, /usr/local/bin/docker-compose, /usr/bin/systemctl, /usr/sbin/ufw

    - name: Authorized keys do deploy (chave pública do CI/dev)
      ansible.posix.authorized_key:
        user: "{{ deploy_user }}"
        key: "{{ lookup('file', deploy_authorized_key_path) }}"
        state: present
      when: deploy_authorized_key_path is defined

    - name: Desabilitar login com senha + root via SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regex }}"
        line: "{{ item.line }}"
        state: present
        validate: "/usr/sbin/sshd -t -f %s"
      loop:
        - { regex: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regex: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regex: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
        - { regex: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
      notify: Restart sshd

    - name: UFW — permitir SSH (22), HTTP (80), HTTPS (443)
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"

    - name: UFW — habilitar com default deny incoming
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Fail2ban ativo + habilitado no boot
      ansible.builtin.systemd:
        name: fail2ban
        state: started
        enabled: true

    - name: Unattended-upgrades configurado para atualizações de segurança
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Download-Upgradeable-Packages "1";
          APT::Periodic::AutocleanInterval "7";
          APT::Periodic::Unattended-Upgrade "1";

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted
