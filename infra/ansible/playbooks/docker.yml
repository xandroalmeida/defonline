---
# Instala Docker Engine + Compose plugin (ADR-002 + ADR-005).

- name: Docker Engine + Compose plugin
  hosts: homolog
  become: true
  gather_facts: true

  tasks:
    - name: Dependências para apt over HTTPS
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Diretório do keyring
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Chave GPG do repositório Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Repositório Docker apt
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | regex_replace('^x86_64$', 'amd64') | regex_replace('^aarch64$', 'arm64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        filename: docker
        state: present
        update_cache: true

    - name: Docker Engine + Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Docker service ativo + enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Usuário deploy no grupo docker (sem sudo para docker)
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        groups: docker
        append: true
