---
# Deploy contínuo de nova versão (ADR-005 §2.4 + ADR-006).
# Idempotente. Entry point do CI/CD (release-homolog.yml + release-production.yml).
# Aceita -e image_tag=vX.Y.Z[-rc.N] (default: latest).

# Roda como `deploy_user` (default do inventário). Sem `become: true` — todas
# as tasks operam em /opt/defonline (de propriedade do deploy) ou usam docker
# (deploy está no grupo docker desde o docker.yml).
- name: Deploy DEFOnline — pull imagem + restart + migrate
  hosts: homolog
  gather_facts: true
  vars:
    image_tag: "{{ image_tag | default('latest') }}"

  tasks:
    - name: Atualizar app_version no .env (renderiza só essa linha)
      ansible.builtin.lineinfile:
        path: "{{ deploy_dir }}/.env"
        regexp: '^APP_VERSION='
        line: "APP_VERSION={{ image_tag }}"
        state: present
      no_log: true

    - name: Renderizar docker-compose.production.yml com nova tag
      ansible.builtin.template:
        src: templates/docker-compose.production.yml.j2
        dest: "{{ deploy_dir }}/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"
      vars:
        app_version: "{{ image_tag }}"

    - name: GHCR login (apenas se houver token de pull)
      community.docker.docker_login:
        registry_url: "{{ container_registry }}"
        username: "{{ ghcr_pull_username | default('xandroalmeida') }}"
        password: "{{ ghcr_pull_token }}"
      when: ghcr_pull_token | length > 0

    - name: Docker compose pull (nova tag)
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ deploy_dir }}"
      changed_when: true

    - name: Docker compose up (rolling restart — Postgres não é recriado)
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ deploy_dir }}"
      changed_when: true

    - name: Aguardar Postgres healthy
      ansible.builtin.command:
        cmd: docker compose exec -T db pg_isready -U {{ postgres_superuser }} -d {{ postgres_db }}
        chdir: "{{ deploy_dir }}"
      register: pg_ready
      retries: 30
      delay: 2
      until: pg_ready.rc == 0
      changed_when: false

    - name: Php artisan migrate
      ansible.builtin.command:
        cmd: docker compose exec -T web php artisan migrate --force
        chdir: "{{ deploy_dir }}"
      register: migrate_result
      changed_when: "'Nothing to migrate' not in migrate_result.stdout"

    - name: Limpar imagens dangling pós-deploy
      ansible.builtin.command:
        cmd: docker image prune -f
      changed_when: false

    # Smoke via URL pública (Caddy → web). `docker compose exec -T web wget`
    # tinha race condition: quando o web é recriado pelo `compose up`, o exec
    # pegava o container antigo em transição. Usar curl externo é mais robusto:
    # Caddy é estável (não recriado), e só responde 200 quando o backend está vivo.
    - name: Smoke pós-deploy (curl /health via URL pública)
      ansible.builtin.uri:
        url: "{{ app_url }}/health"
        return_content: true
        status_code: [200]
      register: smoke
      retries: 30
      delay: 4
      until: smoke.status == 200 and '"status":"ok"' in (smoke.content | default(''))
