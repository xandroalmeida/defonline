---
# Provisionamento inicial do app (ADR-002 + ADR-005).
# - Diretório /opt/defonline
# - .env gerado de template Jinja (vault-aware)
# - docker-compose.production.yml gerado de template
# - Caddyfile gerado de template
# - postgres initdb copiado do repo
# - docker compose pull + up + migrate

# Roda como `deploy_user` (default do inventário). `/opt/defonline` já foi
# criado pelo bootstrap.yml com chown deploy:deploy, então não precisamos de
# `become: true` no play. Tasks que exigem root estão isoladas com become por
# task (atualmente, apenas o copy do init script do Postgres, que vai para
# diretório controlado pelo deploy).
- name: Provisionar aplicação DEFOnline
  hosts: homolog
  gather_facts: true
  vars:
    image_tag: "{{ app_version | default('latest') }}"

  tasks:
    - name: Diretório base /opt/defonline
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"

    - name: Subdiretórios (caddy, postgres/initdb, scripts)
      ansible.builtin.file:
        path: "{{ deploy_dir }}/{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      loop:
        - caddy
        - postgres/initdb
        - scripts

    - name: Copiar init script do Postgres (roles + extensões — ADR-005 §7)
      ansible.builtin.copy:
        src: "../../postgres/initdb/00-roles.sh"
        dest: "{{ deploy_dir }}/postgres/initdb/00-roles.sh"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"

    - name: APP_KEY (gerar uma vez se não existe no vault)
      ansible.builtin.set_fact:
        vault_app_key: "{{ vault_app_key | default('base64:' + (lookup('password', '/dev/null length=32 chars=ascii_letters,digits') | b64encode)) }}"

    - name: .env (template Jinja com vars + vault)
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ deploy_dir }}/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0640"
      no_log: true

    - name: Docker-compose.yml (template renderizado para produção/homologação)
      ansible.builtin.template:
        src: templates/docker-compose.production.yml.j2
        dest: "{{ deploy_dir }}/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"

    - name: Caddyfile (TLS automático Let's Encrypt — ADR-005 §3)
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: "{{ deploy_dir }}/caddy/Caddyfile"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"

    - name: GHCR login (apenas se houver token de pull)
      community.docker.docker_login:
        registry_url: "{{ container_registry }}"
        username: "{{ ghcr_pull_username | default('xandroalmeida') }}"
        password: "{{ ghcr_pull_token }}"
      when: ghcr_pull_token | length > 0

    - name: Docker compose pull (imagem da tag alvo)
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ deploy_dir }}"
      changed_when: false

    - name: Docker compose up (sobe topologia)
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ deploy_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stderr or 'Created' in compose_up.stderr"

    - name: Aguardar Postgres healthy
      ansible.builtin.command:
        cmd: docker compose exec -T db pg_isready -U {{ postgres_superuser }} -d {{ postgres_db }}
        chdir: "{{ deploy_dir }}"
      register: pg_ready
      retries: 30
      delay: 2
      until: pg_ready.rc == 0
      changed_when: false

    - name: Php artisan migrate
      ansible.builtin.command:
        cmd: docker compose exec -T web php artisan migrate --force
        chdir: "{{ deploy_dir }}"
      register: migrate_result
      changed_when: "'Nothing to migrate' not in migrate_result.stdout"

    - name: Smoke interno (curl /health no container web)
      ansible.builtin.command:
        cmd: docker compose exec -T web wget -qO- http://localhost:8000/health
        chdir: "{{ deploy_dir }}"
      register: smoke
      retries: 30
      delay: 4
      until: smoke.rc == 0 and ('"status":"ok"' in smoke.stdout)
      changed_when: false
