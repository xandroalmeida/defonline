# DEFOnline — topologia local (ADR-002): web + worker + scheduler + db + mailpit.
# Em homologação/produção, esta mesma topologia é reproduzida (princípio #6).
name: defonline

x-app: &app-base
  build:
    context: .
    dockerfile: infra/docker/Dockerfile
  image: defonline/app:dev
  working_dir: /var/www/html
  env_file:
    - ./app/.env
  environment:
    PROCESS_TYPE: web
  volumes:
    - ./app:/var/www/html
  depends_on:
    db:
      condition: service_healthy
    mailpit:
      condition: service_started

services:
  web:
    <<: *app-base
    container_name: defonline-web
    environment:
      PROCESS_TYPE: web
    ports:
      - "8090:8000"
    command: >
      sh -c "php artisan serve --host=0.0.0.0 --port=8000"

  worker:
    <<: *app-base
    container_name: defonline-worker
    environment:
      PROCESS_TYPE: worker
    command: >
      sh -c "php artisan queue:work --queue=pdf,emails,lgpd,default
             --tries=3 --backoff=60,180,600 --max-time=3600"

  scheduler:
    <<: *app-base
    container_name: defonline-scheduler
    environment:
      PROCESS_TYPE: scheduler
    command: >
      sh -c "php artisan schedule:work"

  db:
    image: postgres:18-alpine
    container_name: defonline-db
    environment:
      POSTGRES_DB: defonline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secret_local
      APP_DB_USER: defonline_app
      APP_DB_PASSWORD: defonline_app_secret_local
      BACKUP_DB_USER: defonline_backup
      BACKUP_DB_PASSWORD: defonline_backup_secret_local
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5436:5432"
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c log_min_duration_statement=1000ms
      -c log_timezone=America/Sao_Paulo
      -c timezone=America/Sao_Paulo
      -c password_encryption=scram-sha-256
    volumes:
      - pgdata:/var/lib/postgresql
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d defonline"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: defonline-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
    name: defonline_pgdata
