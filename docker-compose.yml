# DEFOnline — topologia local (ADR-002): web + worker + scheduler + db + mailpit.
# Em homologação/produção, esta mesma topologia é reproduzida (princípio #6).
name: defonline

x-app: &app-base
  build:
    context: .
    dockerfile: infra/docker/Dockerfile
    # `dev` = `runtime` + chromium + chromedriver (Dockerfile stage 4).
    # Necessário porque o pre-push (scripts/git-hooks/pre-push.sh) roda
    # `docker compose exec -T web php artisan dusk` dentro deste container.
    # CI homol/prod buildam `--target runtime` (sem chromium, ~500MB menor).
    # STORY-025 / ADR-002.
    target: dev
  image: defonline/app:dev
  working_dir: /var/www/html
  # NÃO injetar `.env` como env_file do container: Laravel já lê `.env` (e
  # `.env.testing` quando APP_ENV=testing) do filesystem via Dotenv. Quando o
  # compose injeta `.env` como variáveis de ambiente do OS, elas viram
  # `$_SERVER[...]` no PHP — e Laravel resolve `env()` via `$_SERVER` antes do
  # `$_ENV`/`putenv()` que o phpunit.xml força. Resultado: `APP_ENV=testing` do
  # phpunit nunca prevalecia e o RefreshDatabase rodava no banco `defonline` do
  # smoke manual, derrubando os dados do PO em cada pre-push. Bug rastreado em
  # 2026-05-23 (STORY-015). Detalhes técnicos em app/phpunit.xml.
  environment:
    PROCESS_TYPE: web
  volumes:
    - ./app:/var/www/html
  depends_on:
    db:
      condition: service_healthy
    mailpit:
      condition: service_started

services:
  web:
    <<: *app-base
    container_name: defonline-web
    environment:
      PROCESS_TYPE: web
    ports:
      - "8090:8000"
    command: >
      sh -c "php artisan serve --host=0.0.0.0 --port=8000"

  worker:
    <<: *app-base
    container_name: defonline-worker
    environment:
      PROCESS_TYPE: worker
    command: >
      sh -c "php artisan queue:work --queue=pdf,emails,lgpd,default
             --tries=3 --backoff=60,180,600 --max-time=3600"

  scheduler:
    <<: *app-base
    container_name: defonline-scheduler
    environment:
      PROCESS_TYPE: scheduler
    command: >
      sh -c "php artisan schedule:work"

  # web-test — espelho do `web` rodando em APP_ENV=testing.
  # Existe para o Dusk (que precisa um Laravel servindo a UI) bater contra o
  # banco `defonline_test` em vez do `defonline` da UI manual. Sem isso, cada
  # pre-push truncava tabelas em `defonline` via DatabaseTruncation. Bug
  # rastreado em 2026-05-23 (STORY-015). `APP_ENV=testing` faz Laravel carregar
  # `.env.testing` (DB_DATABASE=defonline_test, QUEUE_CONNECTION=sync — sem
  # worker dedicado, jobs processam inline na mesma request).
  #
  # Sem porta publicada externamente: Dusk roda dentro do container `web` e
  # acessa via DNS interno `http://web-test:8000`.
  web-test:
    <<: *app-base
    container_name: defonline-web-test
    environment:
      PROCESS_TYPE: web
      APP_ENV: testing
    command: >
      sh -c "php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: postgres:18-alpine
    container_name: defonline-db
    environment:
      POSTGRES_DB: defonline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secret_local
      APP_DB_USER: defonline_app
      APP_DB_PASSWORD: defonline_app_secret_local
      BACKUP_DB_USER: defonline_backup
      BACKUP_DB_PASSWORD: defonline_backup_secret_local
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5436:5432"
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c log_min_duration_statement=1000ms
      -c log_timezone=America/Sao_Paulo
      -c timezone=America/Sao_Paulo
      -c password_encryption=scram-sha-256
    volumes:
      - pgdata:/var/lib/postgresql
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d defonline"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: defonline-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # PhpPgAdmin — DEV LOCAL APENAS. Nunca portar para playbooks de homol/prod
  # (STORY-009, ADR-005 §1.1, §6, §7.5). Em homol/prod o canal é ssh + psql.
  # Porta publicada apenas em 127.0.0.1 (loopback). Credenciais são fixas de dev.
  pgadmin:
    image: dpage/pgadmin4:9
    container_name: defonline-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@defonline.local
      PGADMIN_DEFAULT_PASSWORD: dev
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      # .local é TLD especial: pgAdmin recusa por padrão. Habilitamos só p/ dev.
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: "['local','localhost']"
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: "False"
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "127.0.0.1:8091:80"
    volumes:
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: defonline_pgdata
  pgadmin_data:
    name: defonline_pgadmin_data
